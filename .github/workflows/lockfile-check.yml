name: Lockfile Check

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lockfile-check.yml"
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lockfile-check.yml"

jobs:
  uv-lock-check:
    name: Validate uv.lock
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check lockfile consistency
        run: uv lock --check
